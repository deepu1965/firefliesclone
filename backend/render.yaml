services:
  - type: web
    name: fireflies-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python -m seeds.seed_data
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////var/data/fireflies.db
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL after frontend is deployed
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # Optional — leave blank to use seeded summaries
      - key: LLM_MODEL
        value: gpt-3.5-turbo-0125
    disk:
      name: fireflies-data
      mountPath: /var/data
      sizeGB: 1
